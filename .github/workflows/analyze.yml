name: Analyze Alerts

on:
  schedule:
    # UTC 00:00 = Taiwan time 08:00
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: '分析日期 (YYYY-MM-DD)，空白表示今天'
        required: false
        default: ''

concurrency:
  group: data-write
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: uv sync

      - name: Verify Amplitude setup
        env:
          AMPLITUDE_API_KEY: ${{ secrets.AMPLITUDE_API_KEY }}
        run: |
          uv run python - <<'EOF'
          import os, sys
          key = os.getenv("AMPLITUDE_API_KEY", "")
          print(f"AMPLITUDE_API_KEY set: {bool(key)} (length={len(key)})")
          try:
              from amplitude import Amplitude, BaseEvent
              print("amplitude-analytics: importable OK")
              if key:
                  c = Amplitude(key)
                  c.track(BaseEvent(event_type="llm_verify", user_id="GoogleAlertManager",
                                    event_properties={"step": "workflow_start"}))
                  c.flush()
                  print("Amplitude test event sent OK")
          except Exception as e:
              print(f"Amplitude error: {e}", file=sys.stderr)
          EOF

      - name: Download watchlist CSVs
        run: uv run python cli.py update-list

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Analyze alerts
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            uv run python cli.py analyze --date "${{ github.event.inputs.date }}"
          else
            uv run python cli.py analyze
          fi
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
          GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY_5 }}
          GEMINI_API_KEY_6: ${{ secrets.GEMINI_API_KEY_6 }}
          GEMINI_API_KEY_7: ${{ secrets.GEMINI_API_KEY_7 }}
          GEMINI_API_KEY_8: ${{ secrets.GEMINI_API_KEY_8 }}
          GEMINI_API_KEY_9: ${{ secrets.GEMINI_API_KEY_9 }}
          GEMINI_API_KEY_10: ${{ secrets.GEMINI_API_KEY_10 }}
          AMPLITUDE_API_KEY: ${{ secrets.AMPLITUDE_API_KEY }}
          LLM_APP_NAME: GoogleAlertManager

      - name: Update README and push
        if: always()
        run: |
          uv run python cli.py update-readme
          git add data/reports/ data/scores.json README.md
          git diff --cached --quiet || git commit -m "chore: analyze alerts $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase -X ours --autostash
          git push
