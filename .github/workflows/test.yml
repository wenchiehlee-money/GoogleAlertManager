name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: |
          sed -i 's|path = "\.\./llm".*|git = "https://github.com/wenchiehlee/llm.git"|' pyproject.toml
          uv sync

      - name: Run tests
        run: uv run pytest -v
