name: Fetch Alerts

on:
  schedule:
    # UTC 1,5,9,13,17,21 = Taiwan time 9,13,17,21,1,5（每 4 小時）
    - cron: '0 1,5,9,13,17,21 * * *'
  workflow_dispatch:

concurrency:
  group: data-write
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: uv sync

      - name: Download watchlist CSVs
        run: uv run python cli.py update-list

      - name: Fetch RSS feeds
        run: uv run python cli.py fetch
        env:
          GOOGLE_ALERT_EMAIL: ${{ secrets.GOOGLE_ALERT_EMAIL }}
          GOOGLE_ALERT_PASSWORD: ${{ secrets.GOOGLE_ALERT_PASSWORD }}

      - name: Commit fetched data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/alerts/
          git diff --cached --quiet || git commit -m "chore: fetch alerts $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
